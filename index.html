<style>
:root {
  --dark-blue:#002D5D; --light-blue:#52C9E8; --sky:#73c6e5;
  --white:#FFFFFF; --off-white:#EEF6FB; --pale-blue:#D8EFF8;
  --text-primary:#002D5D; --text-secondary:#3B6A9A; --text-muted:#6E9CBD;
  --card-bg:#FFFFFF; --bg:#EEF6FB; --border:#C5E4F3; --star:#B8902A;
  --c-bbq:#8B3A14; --c-mexican:#C4501A; --c-burgers:#B35900;
  --c-pizza:#C44B2B; --c-seafood:#1A6B8A; --c-southern:#7A4F1E;
  --c-mediterranean:#1A5E8A; --c-asian:#7A1A4A; --c-steakhouse:#4A1A3A;
  --c-cafe:#4A3A1A; --c-sweets:#9A1A6A; --c-cocktails:#1A3A7A;
  --c-french:#2A5A2A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}

/* HEADER */
.site-header{background:var(--dark-blue);padding:14px 16px 12px;padding-top:calc(14px + env(safe-area-inset-top));position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,45,93,.3);}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.header-logo{width:40px;height:40px;flex-shrink:0;}
.header-title-block{flex:1;}
.header-title{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--white);line-height:1.1;}
.header-subtitle{font-size:.68rem;color:var(--sky);font-weight:400;letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
.header-count{background:var(--light-blue);color:var(--dark-blue);font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;}

/* FILTERS */
.filters{display:flex;flex-direction:column;gap:5px;}
.filter-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:1px;align-items:center;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-label{font-size:.58rem;font-weight:700;color:var(--sky);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;min-width:38px;flex-shrink:0;}
.pill{display:inline-flex;align-items:center;background:rgba(255,255,255,.1);border:1px solid rgba(82,201,232,.3);color:rgba(216,239,248,.9);font-size:.72rem;font-weight:500;padding:4px 11px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-user-select:none;user-select:none;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.pill:active{transform:scale(.95);}
.pill.active{background:var(--light-blue);color:var(--dark-blue);border-color:var(--light-blue);font-weight:700;}

/* RESULTS BAR */
.results-bar{display:none;align-items:center;justify-content:space-between;padding:7px 16px;background:var(--pale-blue);border-bottom:1px solid var(--border);font-size:.78rem;color:var(--text-secondary);}
.results-bar.visible{display:flex;}
.clear-btn{background:var(--dark-blue);color:var(--white);border:none;border-radius:12px;padding:4px 12px;font-size:.72rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* MAIN */
main{padding:18px 16px;max-width:680px;margin:0 auto;}

/* SECTION */
.section{margin-bottom:28px;}
.section.hidden{display:none;}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.section-icon{font-size:1.2rem;line-height:1;}
.section-title{font-family:'Playfair Display',serif;font-size:1.18rem;font-weight:700;color:var(--dark-blue);}
.section-line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}

/* CARD */
.card{background:var(--card-bg);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,45,93,.05);transition:box-shadow .15s,transform .15s;}
.card:active{transform:scale(.99);}
.card.featured{border:2px solid var(--star);box-shadow:0 2px 10px rgba(184,144,42,.15);}
.card-accent{height:4px;}
.card-body{padding:13px 15px 15px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;}
.card-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--dark-blue);line-height:1.2;}
.card-price{font-size:.78rem;font-weight:600;color:var(--text-secondary);white-space:nowrap;flex-shrink:0;margin-top:2px;}
.card-type{font-size:.75rem;color:var(--text-muted);margin-bottom:7px;}
.badge{display:inline-block;background:var(--star);color:white;font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:10px;margin-bottom:7px;letter-spacing:.02em;}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px;}
.tag{font-size:.65rem;font-weight:500;padding:2px 8px;border-radius:10px;border:1px solid;}
.tag-Casual{background:#EEF3FB;color:#2A5E9A;border-color:#C5D8F0;}
.tag-Upscale{background:#F5EEF8;color:#6A2D8A;border-color:#DEC5EF;}
.tag-Upscale-Casual{background:#EFF5FB;color:#1A5A8A;border-color:#B8D8F0;}
.tag-Indoor{background:#EEF8F5;color:#1A7A5E;border-color:#B8E5D8;}
.tag-Outdoor{background:#EEF8EE;color:#2A7A2A;border-color:#B8E5B8;}
.tag-Food-Truck{background:#FFF4EE;color:#8A4A1A;border-color:#F0D0B8;}
.must{background:var(--off-white);border-left:3px solid var(--light-blue);padding:8px 11px;border-radius:0 8px 8px 0;margin-bottom:7px;}
.must-label{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--light-blue);margin-bottom:3px;}
.must-text{font-size:.8rem;color:var(--text-primary);line-height:1.45;}
.notes{font-size:.75rem;color:var(--text-muted);font-style:italic;line-height:1.4;}

/* NEIGHBORHOOD CARDS */
.neighborhood-grid{display:grid;gap:10px;}
.nbhd-card{background:var(--dark-blue);border-radius:12px;padding:14px 16px;border:1px solid rgba(82,201,232,.2);cursor:pointer;transition:all .15s;}
.nbhd-card:active{transform:scale(.98);}
.nbhd-card.active-nbhd{border-color:var(--light-blue);background:#00407F;box-shadow:0 0 0 2px var(--light-blue);}
.nbhd-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.nbhd-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--white);margin-bottom:4px;}
.nbhd-tap-hint{font-size:.6rem;color:var(--sky);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;margin-top:3px;opacity:.7;}
.nbhd-card.active-nbhd .nbhd-tap-hint{opacity:1;color:var(--light-blue);}
.nbhd-desc{font-size:.77rem;color:var(--sky);line-height:1.45;}

/* ACCENT COLORS */
.accent-bbq{background:var(--c-bbq);} .accent-mexican{background:var(--c-mexican);}
.accent-burgers{background:var(--c-burgers);} .accent-pizza{background:var(--c-pizza);}
.accent-seafood{background:var(--c-seafood);} .accent-southern{background:var(--c-southern);}
.accent-mediterranean{background:var(--c-mediterranean);} .accent-asian{background:var(--c-asian);}
.accent-steakhouse{background:var(--c-steakhouse);} .accent-cafe{background:var(--c-cafe);}
.accent-sweets{background:var(--c-sweets);} .accent-cocktails{background:var(--c-cocktails);}
.accent-french{background:var(--c-french);}
</style>

<script>
const SPOTS=[
  // BREAKFAST
  {name:"Cauldron Bagels",meal:"breakfast",price:1,cuisine:"cafe",bar:"cafe",neighborhood:"South Minneapolis",type:"Artisan Bagels · South Mpls (pickup)",tags:["Casual"],must:"The malty, crackly boiled-then-baked bagels — get the everything with scallion cream cheese. Order pickup online ahead of time.",notes:"Martha Durrett bakes from her south Minneapolis home. Sells out. Worth planning around.",featured:false,badge:null},
  {name:"Black Walnut Bakery",meal:"breakfast",price:1,cuisine:"cafe",bar:"cafe",neighborhood:"Uptown",type:"Neighborhood Bakery · Uptown",tags:["Casual","Indoor"],must:"Whatever's in the case that morning — croissants and seasonal tarts are the move. Get a coffee and post up.",notes:"A gem of the Hennepin corridor. The neighborhood spot Uptown was always supposed to have.",featured:false,badge:null},
  {name:"Isles Bun & Coffee",meal:"breakfast",price:1,cuisine:"cafe",bar:"cafe",neighborhood:"Uptown",type:"Coffee & Caramel Rolls · Uptown",tags:["Casual","Indoor","Outdoor"],must:"The oversized caramel rolls — gooey, warm, the size of your face. Classic Minneapolis morning.",notes:"An Uptown institution. Weekend lines move fast.",featured:false,badge:null},
  {name:"Saint Dinette",meal:"breakfast",price:2,cuisine:"burgers",bar:"burgers",neighborhood:"St. Paul – Lowertown",type:"Neighborhood Bistro · St. Paul Lowertown",tags:["Casual","Indoor"],must:"The cheeseburger — triple-threat brisket/sirloin/chuck with gooey american and pickles. Best burger in St. Paul, full stop.",notes:"Do brunch on Saturdays. Stash your farmers market finds in their walk-in cooler.",featured:true,badge:"⭐ Best in St. Paul"},
  {name:"Zao Bakery & Café",meal:"breakfast",price:1,cuisine:"cafe",bar:"cafe",neighborhood:"St. Paul – University Ave",type:"Lao-American Bakery · Frogtown, St. Paul",tags:["Casual","Indoor"],must:"The 20-foot pastry case — pick three things. The honeyed, sunlit space makes anything taste better.",notes:"Best new restaurant of 2025 per MSP Magazine. Family affair from the 88 Oriental Foods crew.",featured:true,badge:"🏆 Bucket List"},

  // BRUNCH
  {name:"Chilango",meal:"brunch",price:2,cuisine:"mexican",bar:"mexican",neighborhood:"Uptown",type:"Modern Mexican · Lake Bde Maka Ska",tags:["Casual","Outdoor","Indoor"],must:"Tuna tostadas or the Baja fish tacos, then linger with a margarita and lake views. Summer brunch here is unmatched.",notes:"Chef Jorge Guzmán's authentic-but-unexpected Mexican. The patio over the lake in summer is one of the best seats in the city.",featured:true,badge:"⭐ Best View"},
  {name:"Gia",meal:"brunch",price:2,cuisine:"mediterranean",bar:"mediterranean",neighborhood:"South Minneapolis",type:"Simple Italian · Southwest Mpls",tags:["Casual","Indoor"],must:"The handmade pasta of the day, then whatever salad the kitchen is riffing on. Arrive early — seats fill fast.",notes:"Co-chefs Jo Seddon and Lisa Wengler built the neighborhood spot everyone wishes they had down the street.",featured:false,badge:null},
  {name:"Barbette",meal:"brunch",price:2,cuisine:"french",bar:"french",neighborhood:"Uptown",type:"French Bistro · Uptown",tags:["Upscale-Casual","Indoor","Outdoor"],must:"Croque madame or eggs Benedict with a Kir Royale. Proper French technique in a warm, packed room.",notes:"Uptown anchor for decades. Weekend brunch is a scene and absolutely worth it.",featured:false,badge:null},
  {name:"Bûcheron",meal:"brunch",price:3,cuisine:"french",bar:"french",neighborhood:"South Minneapolis",type:"French-Midwest Bistro · South Mpls",tags:["Upscale-Casual","Indoor"],must:"The Wagyu steak with espelette beurre blanc and potato mousse. James Beard caliber cooking in a neighborhood setting.",notes:"Husband-and-wife team Adam Ritter (Demi) and Jeanie Janas Ritter (Bellecour). One of the most technically accomplished spots in the state.",featured:true,badge:"🏆 Bucket List"},
  {name:"Forepaugh's",meal:"brunch",price:3,cuisine:"mediterranean",bar:"mediterranean",neighborhood:"St. Paul – Grand / Cathedral Hill",type:"Victorian Mansion Dining · Summit Ave, St. Paul",tags:["Upscale","Indoor"],must:"The seasonal brunch menu in the Victorian dining rooms. A proper St. Paul experience with the architecture to match the food.",notes:"A beloved St. Paul institution that rose from the dead in 2024. The building is magnificent.",featured:false,badge:null},

  // LUNCH
  {name:"Animales Barbeque Co.",meal:"lunch",price:2,cuisine:"bbq",bar:"bbq",neighborhood:"Minneapolis – North Loop / Harrison",type:"Texas-Style BBQ · Harrison",tags:["Casual","Indoor","Outdoor"],must:"St. Louis ribs and smoked pork belly — order both. The smash burgers on the Anytime Menu are legitimately great backup.",notes:"Food truck → 12,500 sq ft restaurant with a full bar and live music. Go early, best cuts sell out.",featured:true,badge:"🏆 Bucket List"},
  {name:"Saturday Dumpling Co.",meal:"lunch",price:1,cuisine:"asian",bar:"asian",neighborhood:"Northeast Minneapolis",type:"Dumplings & Rice Bowls · Northeast",tags:["Casual","Indoor"],must:"Pan-fried pork dumplings and the scallion pancake burrito. Yes to both.",notes:"Husband-and-wife shop born from homesickness. Dumplings made fresh daily.",featured:false,badge:null},
  {name:"Sea Salt Eatery",meal:"lunch",price:1,cuisine:"seafood",bar:"seafood",neighborhood:"South Minneapolis",type:"Lakeside Seafood Shack · Minnehaha Park",tags:["Casual","Outdoor"],must:"Fish tacos and a cup of clam chowder at the patio near the waterfall. Bike the creek trail, stop here.",notes:"Seasonal — spring through fall only. One of the great Minneapolis afternoon moves.",featured:false,badge:"⭐ Best in Mpls"},
  {name:"Young Joni",meal:"lunch",price:2,cuisine:"pizza",bar:"pizza",neighborhood:"Northeast Minneapolis",type:"Wood-Fired Pizza · Northeast",tags:["Casual","Indoor"],must:"Any wood-fired pizza — the kimchi sausage version is a standout. Stay for the hidden back bar.",notes:"Ann Kim's flagship. One of the most celebrated spots in the city.",featured:false,badge:null},
  {name:"Revival",meal:"lunch",price:2,cuisine:"southern",bar:"southern",neighborhood:"South Minneapolis",type:"Southern Fried Chicken · Multiple Locations",tags:["Casual","Indoor"],must:"Hot chicken sandwich with biscuit and collard greens. Order medium heat unless you know what you're doing.",notes:"The best fried chicken in Minneapolis. Full stop.",featured:false,badge:"⭐ Best in Mpls"},
  {name:"Vagabondo",meal:"lunch",price:2,cuisine:"pizza",bar:"pizza",neighborhood:"Excelsior",type:"Sicilian Pizza & Pasta · Excelsior",tags:["Casual","Indoor","Outdoor"],must:"The sourdough Neapolitan pizza and housemade pasta. Chef David Fhima's love letter to his Sicilian roots on Lake Minnetonka.",notes:"Corner of Water & Second in Excelsior — the hottest dining block in the suburbs right now. Across from Mirabelle.",featured:false,badge:null},
  {name:"Owamni",meal:"lunch",price:3,cuisine:"seafood",bar:"seafood",neighborhood:"Minneapolis – Mill District",type:"Indigenous American Cuisine · Mill District",tags:["Upscale-Casual","Indoor","Outdoor"],must:"Fresh-made tortillas with rotating corn varieties — oaky, meaty, earthy. Tamales stuffed with confit rabbit or strawberry-rhubarb.",notes:"James Beard Award winner. A must on any serious food tour of the Twin Cities.",featured:true,badge:"🏆 Bucket List"},
  {name:"Hey Bear Café",meal:"lunch",price:1,cuisine:"cafe",bar:"cafe",neighborhood:"St. Paul – Midway",type:"Sandwich Shop · Midway, St. Paul",tags:["Casual","Indoor"],must:"The Cuban — modeled after Victor's famous version. Nothing on the menu costs more than $10.",notes:"Humble, brilliant, undersung. Kitchen manager Oskar Johnson makes every sandwich count.",featured:false,badge:"⭐ Best in St. Paul"},
  {name:"El Burrito Mercado",meal:"lunch",price:1,cuisine:"mexican",bar:"mexican",neighborhood:"St. Paul – West 7th",type:"Mexican Market & Café · West 7th, St. Paul",tags:["Casual","Indoor"],must:"The tortas and tamales from the deli counter. The burrito ahogado is the real move.",notes:"A St. Paul institution. Family-run Mexican market and café that's been feeding the neighborhood for decades.",featured:false,badge:"⭐ Best in St. Paul"},

  // DINNER
  {name:"Vinai",meal:"dinner",price:3,cuisine:"asian",bar:"asian",neighborhood:"Northeast Minneapolis",type:"Hmong-American · Northeast",tags:["Upscale-Casual","Indoor"],must:"Double-cut pork chop, braised beef rib, crabby fried rice. Ask about the secret menu.",notes:"Chef Yia Vang's landmark, named after the Thai refugee camp where his parents met. The biggest dining story of 2024. Book way ahead.",featured:true,badge:"🏆 Bucket List"},
  {name:"Spoon and Stable",meal:"dinner",price:4,cuisine:"mediterranean",bar:"mediterranean",neighborhood:"Minneapolis – North Loop / Harrison",type:"French-Midwest Fine Dining · North Loop",tags:["Upscale","Indoor"],must:"Bison tartare and the handmade pasta — both, non-negotiable. The wine program is serious.",notes:"Gavin Kaysen's James Beard flagship in a restored horse stable. The gold standard of Minneapolis dining.",featured:true,badge:"🏆 Bucket List"},
  {name:"Dario",meal:"dinner",price:3,cuisine:"mediterranean",bar:"mediterranean",neighborhood:"Minneapolis – North Loop / Harrison",type:"Inventive Pasta · North Loop",tags:["Upscale-Casual","Indoor"],must:"The doppio pasta stuffed with sunchoke and ricotta. The beef tartare with puffed rice. The spicy rigatoni. All of it.",notes:"Joe Rolle's punky, technically brilliant pasta spot. Best new restaurant of 2024. The tartare alone is worth a trip.",featured:true,badge:"⭐ Best in Mpls"},
  {name:"Minari",meal:"dinner",price:3,cuisine:"asian",bar:"asian",neighborhood:"Northeast Minneapolis",type:"Modern Korean · Northeast",tags:["Upscale","Indoor"],must:"Dim sum, charcoal BBQ strip loin, and crab ramyeon. The red interior is as dramatic as the food.",notes:"Daniel del Prado's Korean concept in a bold, sexy room. Loud, alive, and one of the best dining rooms in the city.",featured:false,badge:null},
  {name:"Myriel",meal:"dinner",price:3,cuisine:"mediterranean",bar:"mediterranean",neighborhood:"St. Paul – Grand / Cathedral Hill",type:"Seasonal European · South St. Paul",tags:["Upscale-Casual","Indoor"],must:"Trust the tasting menu completely — Karyn Tomlinson's seasonal cooking is worth flying to Minnesota for.",notes:"James Beard Award winner, 2025. Among the most technically accomplished restaurants in the state.",featured:true,badge:"🏆 Bucket List"},
  {name:"Hai Hai",meal:"dinner",price:2,cuisine:"asian",bar:"asian",neighborhood:"Northeast Minneapolis",type:"Southeast Asian Street Food · Northeast",tags:["Casual","Indoor","Outdoor"],must:"Turmeric ribs and the spring rolls — then order something tropical to drink. Built for sharing.",notes:"Bright, colorful, actually fun. One of the easier great tables to get in Northeast.",featured:false,badge:null},
  {name:"Aster House",meal:"dinner",price:3,cuisine:"mediterranean",bar:"mediterranean",neighborhood:"Minneapolis – St. Anthony Main",type:"Supper Club · St. Anthony Main",tags:["Upscale-Casual","Indoor"],must:"Wild rice fritters from the lazy Susan, then the rotating supper club menu. One of the prettiest dining rooms in the city.",notes:"In the 1880 Brown-Ryan Livery Stable. Menu developed with Myriel's Karyn Tomlinson.",featured:false,badge:null},
  {name:"Stock & Bond",meal:"dinner",price:4,cuisine:"steakhouse",bar:"steakhouse",neighborhood:"Minneapolis – Downtown",type:"Modern Steakhouse · Downtown",tags:["Upscale","Indoor"],must:"Fellers Ranch wagyu New York strip. Add the colossal shrimp cocktail. Then stay for the 350+ American whiskey list.",notes:"In the historic Farmers and Mechanics Bank building. Art deco ceiling mural. A proper downtown splurge.",featured:false,badge:null},
  {name:"112 Eatery",meal:"dinner",price:2,cuisine:"mediterranean",bar:"mediterranean",neighborhood:"Minneapolis – North Loop / Harrison",type:"Late-Night Creative Comfort · North Loop",tags:["Casual","Indoor"],must:"Foie gras torchon or the tagliatelle. Go after 9pm. No reservations, better for it.",notes:"A local legend. Creative menu that changes constantly. The best late-night serious food in the city.",featured:false,badge:"⭐ Best in Mpls"},
  {name:"Cafe Yoto",meal:"dinner",price:2,cuisine:"asian",bar:"asian",neighborhood:"Northeast Minneapolis",type:"Japanese Udon · Northeast",tags:["Casual","Indoor"],must:"Thick housemade udon in deeply flavored broth and the ahi tuna temaki in crispy nori. Counter service, all skill.",notes:"Chef Yo Hasegawa trained under the Midwest's best Japanese chef. MN Monthly best new restaurant of 2025.",featured:true,badge:"⭐ Best in Mpls"},
  {name:"Mirabelle",meal:"dinner",price:3,cuisine:"seafood",bar:"seafood",neighborhood:"Excelsior",type:"Modern Supper Club · Excelsior",tags:["Upscale-Casual","Indoor"],must:"Crab-stuffed walleye and the bucatini. Start with the relish tray and popovers with honey butter.",notes:"Jester Concepts' anchor at Water & Second — now the hottest dining corner in the suburbs. Parlour Burger one floor down.",featured:true,badge:"⭐ Best Suburbs"},
  {name:"Khue's Kitchen",meal:"dinner",price:2,cuisine:"asian",bar:"asian",neighborhood:"St. Paul – University Ave",type:"Vietnamese · St. Paul",tags:["Casual","Indoor"],must:"The Vietnamese classics done with the technique of someone who grew up in Quang's legendary kitchen.",notes:"Star Tribune best new restaurant of 2025. Chef Eric Pham is the next chapter of St. Paul's Vietnamese legacy.",featured:true,badge:"🏆 Bucket List"},
  {name:"Xelas by El Sazon",meal:"dinner",price:2,cuisine:"cocktails",bar:"cocktails",neighborhood:"Stillwater",type:"Latin Cocktail Bar & Dinner · Stillwater",tags:["Upscale-Casual","Indoor"],must:"The Cenote — clarified coconut milk mezcal margarita. The rum Old Fashioned. Then do the $45 three-course dinner.",notes:"Bar director Zoilo Ruacho-Marquez is making some of the best cocktails in the state. Yucatán-focused, small-batch Latin spirits. Drive to Stillwater.",featured:true,badge:"⭐ Best Suburbs"},
  {name:"Golden Thyme",meal:"dinner",price:2,cuisine:"southern",bar:"southern",neighborhood:"St. Paul – Selby / Rondo",type:"Southern Soul Food · Rondo, St. Paul",tags:["Casual","Indoor"],must:"Jambalaya linguine, honey-butter johnnycakes, Tater Tot gumbo. Comfort food with a story worth knowing.",notes:"Purchased by the Rondo Community Land Trust to revitalize the historically Black Selby corridor. A meaningful place.",featured:false,badge:null},
  {name:"Starling",meal:"dinner",price:3,cuisine:"mediterranean",bar:"mediterranean",neighborhood:"Edina",type:"Steak & Seafood · Edina",tags:["Upscale-Casual","Indoor"],must:"The pici, pressed game hen, and the steak program. Isaac Becker and Nancy St. Pierre doing what they do best.",notes:"The 112 Eatery and Bar La Grassa duo transformed their Snack Bar space. A quiet power move in the suburbs.",featured:false,badge:null},
  {name:"Shiki Noodle Bar",meal:"dinner",price:2,cuisine:"asian",bar:"asian",neighborhood:"Excelsior",type:"Japanese Ramen & Noodles · Excelsior",tags:["Casual","Indoor"],must:"The ramen — rich, deeply built broth. Upstairs from Mirabelle, same building as Parlour. Make a night of Water Street.",notes:"Jester Concepts' Japanese concept. Excelsior's surprise dining hub of 2025.",featured:false,badge:null},
  {name:"Bellecour Bistro",meal:"dinner",price:3,cuisine:"french",bar:"french",neighborhood:"Minneapolis – North Loop / Harrison",type:"French Bistro · North Loop",tags:["Upscale-Casual","Indoor"],must:"The French onion soup and moules frites to start. Then whatever the rotating plat du jour is.",notes:"Gavin Kaysen's beloved Wayzata bistro resurrected in the North Loop, more intimate and intentional than the original.",featured:false,badge:null},
  {name:"Mancini's Char House",meal:"dinner",price:3,cuisine:"steakhouse",bar:"steakhouse",neighborhood:"St. Paul – West 7th",type:"Supper Club Steakhouse · West 7th, St. Paul",tags:["Upscale-Casual","Indoor"],must:"The char-broiled steak, old school and exactly right. Mr. Mancini himself may serve you a drink.",notes:"A St. Paul institution. The supper club that never needed to change.",featured:false,badge:"⭐ Best in St. Paul"},
  {name:"Tongue in Cheek",meal:"dinner",price:3,cuisine:"mediterranean",bar:"mediterranean",neighborhood:"St. Paul – Lowertown",type:"Creative American · Lowertown, St. Paul",tags:["Upscale-Casual","Indoor"],must:"The seasonal small plates — whatever the kitchen is riffing on. Menu changes constantly; trust it.",notes:"One of the most inventive kitchens in St. Paul. Great wine list. Go without a plan.",featured:false,badge:null},
  {name:"Stargazer by Travail",meal:"dinner",price:2,cuisine:"cocktails",bar:"cocktails",neighborhood:"Northeast Minneapolis",type:"Intergalactic Cocktail Bar & Bites · Northeast",tags:["Casual","Indoor"],must:"Whatever the Travail crew is riffing on. Right next door to Vinai — make it a block crawl.",notes:"Collaboration between Travail (Mike Brown, Bob Gerken) and Meteor's Robb Jones. Weird, fun, genuinely good.",featured:false,badge:null},

  // SWEETS
  {name:"Diane's Place",meal:"sweets",price:1,cuisine:"sweets",bar:"sweets",neighborhood:"South Minneapolis",type:"Pastry & Dessert Café · South Mpls",tags:["Casual","Indoor"],must:"Whatever Diane Moua is making today — the Spam and nori croissant is the signature. Food & Wine named this the best new restaurant in the country.",notes:"MN Monthly best new restaurant of 2024. James Beard honoree. World-class pastry at neighborhood prices.",featured:true,badge:"🏆 Bucket List"},
  {name:"Mother Dough Bakery",meal:"sweets",price:1,cuisine:"cafe",bar:"cafe",neighborhood:"Minneapolis – Downtown",type:"Sourdough Bakery · Mill District & Downtown",tags:["Casual","Indoor"],must:"The sourdough loaves and morning pastries. Grab one to go with coffee before anything else downtown.",notes:"Multiple locations. The Mill District outpost is the original.",featured:false,badge:null},

  // COFFEE

const PRICE_MAP={1:'$',2:'$$',3:'$$$',4:'$$$$'};
const SECTIONS=['breakfast','brunch','lunch','dinner','sweets','coffee','bars'];
const activeFilters={meal:null,price:null,cuisine:null,neighborhood:null};

function buildCards(){
  SECTIONS.forEach(section=>{
    const container=document.getElementById('cards-'+section);
    container.innerHTML=SPOTS.filter(s=>s.meal===section).map(cardHTML).join('');
  });
}

function cardHTML(s){
  const price=PRICE_MAP[s.price];
  const tags=(s.tags||[]).map(t=>`<span class="tag tag-${t.replace(/\s+/g,'-')}">${t}</span>`).join('');
  const badge=s.badge?`<div class="badge">${s.badge}</div>`:'';
  const notes=s.notes?`<div class="notes">${s.notes}</div>`:'';
  return `<div class="card${s.featured?' featured':''}" data-meal="${s.meal}" data-price="${s.price}" data-cuisine="${s.cuisine}" data-neighborhood="${s.neighborhood}">
    <div class="card-accent accent-${s.bar}"></div>
    <div class="card-body">
      <div class="card-top"><div class="card-name">${s.name}</div><div class="card-price">${price}</div></div>
      <div class="card-type">${s.type}</div>
      ${badge}<div class="tags">${tags}</div>
      <div class="must"><div class="must-label">Order This</div><div class="must-text">${s.must}</div></div>
      ${notes}
    </div>
  </div>`;
}

function buildNeighborhoods(){
  document.getElementById('neighborhoodGrid').innerHTML=NEIGHBORHOODS.map(n=>`
    <div class="nbhd-card" data-nbhd="${n.id}" onclick="toggleNeighborhood('${n.id}',this)">
      <div class="nbhd-card-top">
        <div class="nbhd-name">${n.name}</div>
        <div class="nbhd-tap-hint" id="hint-${n.id.replace(/[^a-z0-9]/gi,'_')}">Tap to filter</div>
      </div>
      <div class="nbhd-desc">${n.desc}</div>
    </div>`).join('');
}

function toggleNeighborhood(id,el){
  if(activeFilters.neighborhood===id){
    activeFilters.neighborhood=null;
    document.querySelectorAll('.nbhd-card').forEach(c=>{
      c.classList.remove('active-nbhd');
      const h=document.getElementById('hint-'+c.dataset.nbhd.replace(/[^a-z0-9]/gi,'_'));
      if(h)h.textContent='Tap to filter';
    });
  } else {
    activeFilters.neighborhood=id;
    document.querySelectorAll('.nbhd-card').forEach(c=>{
      const h=document.getElementById('hint-'+c.dataset.nbhd.replace(/[^a-z0-9]/gi,'_'));
      if(c.dataset.nbhd===id){c.classList.add('active-nbhd');if(h)h.textContent='Tap to clear';}
      else{c.classList.remove('active-nbhd');if(h)h.textContent='Tap to filter';}
    });
  }
  applyFilters();
}

function applyFilters(){
  let total=0;
  const has=Object.values(activeFilters).some(v=>v!==null);
  SECTIONS.forEach(section=>{
    let cnt=0;
    document.querySelectorAll(`#cards-${section} .card`).forEach(card=>{
      const ok=(!activeFilters.meal||card.dataset.meal===activeFilters.meal)
             &&(!activeFilters.price||card.dataset.price===activeFilters.price)
             &&(!activeFilters.cuisine||card.dataset.cuisine===activeFilters.cuisine)
             &&(!activeFilters.neighborhood||card.dataset.neighborhood===activeFilters.neighborhood);
      card.style.display=ok?'':'none';
      if(ok){cnt++;total++;}
    });
    document.getElementById('section-'+section).classList.toggle('hidden',cnt===0);
  });
  document.getElementById('section-neighborhoods').classList.remove('hidden');
  const bar=document.getElementById('resultsBar');
  if(has){
    bar.classList.add('visible');
    const parts=[];
    if(activeFilters.neighborhood)parts.push(activeFilters.neighborhood.split('–').pop().trim());
    if(activeFilters.meal)parts.push(activeFilters.meal);
    if(activeFilters.cuisine)parts.push(activeFilters.cuisine);
    if(activeFilters.price)parts.push(PRICE_MAP[parseInt(activeFilters.price)]);
    document.getElementById('resultsText').textContent=`${total} spot${total!==1?'s':''} · ${parts.join(', ')}`;
  } else {
    bar.classList.remove('visible');
  }
  document.getElementById('spotCount').textContent=has?`${total} spots`:`${SPOTS.length} spots`;
}

function clearFilters(){
  Object.keys(activeFilters).forEach(k=>activeFilters[k]=null);
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nbhd-card').forEach(c=>{
    c.classList.remove('active-nbhd');
    const h=document.getElementById('hint-'+c.dataset.nbhd.replace(/[^a-z0-9]/gi,'_'));
    if(h)h.textContent='Tap to filter';
  });
  applyFilters();
}

document.querySelectorAll('.pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    const type=pill.dataset.filter,val=pill.dataset.value;
    if(activeFilters[type]===val){activeFilters[type]=null;pill.classList.remove('active');}
    else{document.querySelectorAll(`.pill[data-filter="${type}"]`).forEach(p=>p.classList.remove('active'));activeFilters[type]=val;pill.classList.add('active');}
    applyFilters();
  });
});

buildCards();
buildNeighborhoods();
applyFilters();
</script>
